name: Trigger Kaggle LoRA Training

on:
  push:
    branches: [main]
    paths:
      - train.py
      - requirements.txt
      - data_validation.py
      - quality_gate.py
      - kaggle_train.py
      - kernel-metadata.json
      - .kaggleignore
      - .github/workflows/trigger_kaggle_train.yml
      - whisper_ja/**
  workflow_dispatch:
    inputs:
      reazonspeech_size:
        description: "Dataset size for validation/train trigger"
        required: false
        default: "small"
      num_proc:
        description: "CPU workers for preprocessing in Kaggle runtime"
        required: false
        default: "1"
      max_train_samples:
        description: "Limit train samples (0 = full dataset)"
        required: false
        default: "0"

permissions:
  contents: read

jobs:
  kaggle-train:
    runs-on: ubuntu-latest
    env:
      REAZONSPEECH_SIZE: ${{ inputs.reazonspeech_size || 'small' }}
      NUM_PROC: ${{ inputs.num_proc || '1' }}
      MAX_TRAIN_SAMPLES: ${{ inputs.max_train_samples || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate kernel metadata
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          path = Path("kernel-metadata.json")
          if not path.exists():
              raise SystemExit("Missing kernel-metadata.json")

          metadata = json.loads(path.read_text(encoding="utf-8"))
          kernel_id = metadata.get("id", "")
          title = metadata.get("title", "").strip()
          if not kernel_id:
              raise SystemExit("kernel-metadata.json missing field: id")
          if "your_kaggle_username" in kernel_id:
              raise SystemExit("Please replace placeholder in kernel-metadata.json id")
          if "/" not in kernel_id:
              raise SystemExit("kernel-metadata.json id must be in format: username/kernel-slug")
          if not title:
              raise SystemExit("kernel-metadata.json missing field: title")

          def slugify(value: str) -> str:
              return re.sub(r"[^a-z0-9]+", "-", value.lower()).strip("-")

          kernel_slug = kernel_id.split("/", 1)[1]
          title_slug = slugify(title)
          if title_slug != kernel_slug:
              raise SystemExit(
                  "kernel-metadata title slug does not match id slug "
                  f"({title_slug} != {kernel_slug}). Update title to avoid Kaggle 409 conflicts."
              )
          print(f"Kernel id: {kernel_id}")
          PY

      - name: Install validation + Kaggle dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install datasets==2.21.0 soundfile librosa kaggle

      - name: Require HF token for data validation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "Missing secret HF_TOKEN in GitHub repo settings."
            exit 1
          fi

      - name: Validate training dataset quality
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python data_validation.py \
            --dataset_name reazon-research/reazonspeech \
            --dataset_config "${REAZONSPEECH_SIZE}" \
            --split train \
            --text_column transcription \
            --audio_column audio \
            --max_samples 200 \
            --min_samples 100 \
            --max_empty_text_ratio 0.05 \
            --max_invalid_audio_ratio 0.05 \
            --min_avg_duration_sec 0.5 \
            --min_japanese_char_ratio 0.30 \
            --trust_remote_code \
            --output reports/data_validation_train.json \
            --fail_on_check

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: training-data-validation-report
          path: reports/data_validation_train.json
          if-no-files-found: warn

      - name: Configure Kaggle API key
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          if [ -z "${KAGGLE_USERNAME}" ] || [ -z "${KAGGLE_KEY}" ]; then
            echo "Missing KAGGLE_USERNAME or KAGGLE_KEY secret."
            exit 1
          fi
          mkdir -p ~/.kaggle
          cat > ~/.kaggle/kaggle.json <<JSON
          {"username":"${KAGGLE_USERNAME}","key":"${KAGGLE_KEY}"}
          JSON
          chmod 600 ~/.kaggle/kaggle.json

      - name: Validate kernel owner matches Kaggle username
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: |
          KERNEL_ID="$(python -c 'import json; print(json.load(open("kernel-metadata.json", "r", encoding="utf-8"))["id"])')"
          KERNEL_OWNER="${KERNEL_ID%%/*}"
          if [ "${KERNEL_OWNER}" != "${KAGGLE_USERNAME}" ]; then
            echo "kernel-metadata.json owner (${KERNEL_OWNER}) does not match KAGGLE_USERNAME secret (${KAGGLE_USERNAME})"
            exit 1
          fi
          echo "Kernel owner check passed: ${KERNEL_OWNER}"

      - name: Create runtime secret bundle for Kaggle run
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "HF_TOKEN": os.environ.get("HF_TOKEN", "").strip(),
              "WANDB_API_KEY": os.environ.get("WANDB_API_KEY", "").strip(),
          }
          payload = {k: v for k, v in payload.items() if v}

          path = Path("runtime_secrets.json")
          path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          path.chmod(0o600)
          print(f"Created {path} with keys: {sorted(payload.keys())}")
          PY

      - name: Inject runtime secrets into Kaggle script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          GITHUB_READ_TOKEN: ${{ secrets.GITHUB_READ_TOKEN || secrets.CROSS_REPO_PAT }}
          GITHUB_SOURCE_REPO: ${{ github.repository }}
          GITHUB_SOURCE_REF: ${{ github.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          script_path = Path("kaggle_train.py")
          source = script_path.read_text(encoding="utf-8")

          payload = {
              "HF_TOKEN": os.environ.get("HF_TOKEN", "").strip(),
              "WANDB_API_KEY": os.environ.get("WANDB_API_KEY", "").strip(),
              "GITHUB_READ_TOKEN": os.environ.get("GITHUB_READ_TOKEN", "").strip(),
              "GITHUB_SOURCE_REPO": os.environ.get("GITHUB_SOURCE_REPO", "").strip(),
              "GITHUB_SOURCE_REF": os.environ.get("GITHUB_SOURCE_REF", "").strip(),
          }
          payload = {k: v for k, v in payload.items() if v}

          marker = "EMBEDDED_RUNTIME_SECRETS: dict[str, str] = "
          replacement_line = marker + json.dumps(payload, ensure_ascii=False)
          lines = source.splitlines()
          replaced = False
          for idx, line in enumerate(lines):
              if line.strip().startswith(marker):
                  lines[idx] = replacement_line
                  replaced = True
                  break

          if not replaced:
              raise SystemExit("Failed to locate EMBEDDED_RUNTIME_SECRETS placeholder for patching")

          patched = "\n".join(lines) + ("\n" if source.endswith("\n") else "")
          script_path.write_text(patched, encoding="utf-8")
          print(f"Injected secret keys into script: {sorted(payload.keys())}")
          PY

      - name: Push kernel and trigger run
        run: |
          set -euo pipefail
          kaggle kernels push -p .

      - name: Clean up runtime secret bundle
        if: always()
        run: |
          rm -f runtime_secrets.json
          git checkout -- kaggle_train.py

      - name: Print kernel status
        run: |
          KERNEL_ID="$(python -c 'import json; print(json.load(open("kernel-metadata.json", "r", encoding="utf-8"))["id"])')"
          echo "Kernel pushed: ${KERNEL_ID}"
          kaggle kernels status "${KERNEL_ID}"

      - name: Write run summary
        if: always()
        run: |
          KERNEL_ID="$(python -c 'import json; print(json.load(open("kernel-metadata.json", "r", encoding="utf-8"))["id"])')"
          {
            echo "## CT Run Summary"
            echo "- Workflow: Trigger Kaggle LoRA Training"
            echo "- ReazonSpeech size: ${REAZONSPEECH_SIZE}"
            echo "- num_proc: ${NUM_PROC}"
            echo "- max_train_samples: ${MAX_TRAIN_SAMPLES}"
            echo "- Dataset validation report: training-data-validation-report"
            echo "- Kaggle kernel pushed from current commit."
            echo "- Kernel: https://www.kaggle.com/code/${KERNEL_ID}"
            echo "- Versions: https://www.kaggle.com/code/${KERNEL_ID}/versions"
          } >> "$GITHUB_STEP_SUMMARY"
